<div class="login-page">
  <div class="login-card">
    <h2 class="text-center mb-4">R4 Login</h2>

    <input
      type="password"
      class="form-control mb-3"
      placeholder="R4 Password"
      [(ngModel)]="password"
    />

    <button class="btn btn-primary w-100" [disabled]="!password" (click)="login()">Login</button>

  </div>
</div>
